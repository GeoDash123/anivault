<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AniVault</title>
  <base href="/">

  <script>
    (function () {
      try {
        const theme = localStorage.getItem('aniVaultTheme');

        if (theme === 'dark') {
          document.documentElement.classList.add('dark-theme');
        }
      } catch (error) {}
    })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <app-root></app-root>
</body>
</html>
