<article class="anime-card" *ngIf="anime">
  <button class="heart">♡</button>

  <img [src]="anime.images.jpg.image_url" [alt]="anime.title" />

  <div class="card-body">
    <h3>{{ anime.title }}</h3>

    <p>
      ⭐ {{ anime.score || 'N/A' }}
      <span>·</span>
      {{ anime.episodes || '?' }} ep.
    </p>

    <span class="tag">{{ anime.type || 'TV' }}</span>
  </div>
</article>
