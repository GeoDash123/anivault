<header class="navbar">
  <a class="brand" routerLink="/">
    <span class="logo">▷</span>
    <span>AniVault</span>
  </a>

  <div class="nav-right">
    <nav class="nav-links">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }">
        Inicio
      </a>

      <a routerLink="/top" routerLinkActive="active">
        Top
      </a>

      <a
        *ngIf="authService.loggedIn()"
        routerLink="/favoritos"
        routerLinkActive="active">
        Favoritos
      </a>

      <a
        *ngIf="!authService.loggedIn()"
        routerLink="/login"
        routerLinkActive="active">
        Iniciar sesión
      </a>

      <button
        *ngIf="authService.loggedIn()"
        type="button"
        class="logout-btn"
        (click)="openLogoutModal()">
        Cerrar sesión
      </button>
    </nav>

    <button
      type="button"
      class="theme-toggle"
      [class.dark]="themeService.isDark()"
      (click)="themeService.toggleTheme()"
      [attr.aria-label]="themeService.isDark() ? 'Activar modo claro' : 'Activar modo oscuro'">

      <span class="toggle-icon sun">☀️</span>
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-thumb"></span>

    </button>
  </div>
</header>

<div
  class="modal-backdrop"
  *ngIf="showLogoutModal"
  (click)="cancelLogout()">

  <section
    class="logout-modal"
    (click)="$event.stopPropagation()">

    <div class="modal-icon">
      ⎋
    </div>

    <h2>¿Cerrar sesión?</h2>

    <p>
      Tu sesión actual se cerrará. Podrás volver a iniciar sesión cuando quieras.
    </p>

    <div class="modal-actions">
      <button
        type="button"
        class="cancel-btn"
        (click)="cancelLogout()">
        Cancelar
      </button>

      <button
        type="button"
        class="confirm-btn"
        (click)="confirmLogout()">
        Cerrar sesión
      </button>
    </div>

  </section>

</div>
