<section class="hero">
  <h1>Top animes</h1>
  <p>Descubre los animes mejor valorados por la comunidad.</p>
</section>

<main class="top-page">
  <section class="results">
    <div class="section-header">
      <div>
        <h2>Ranking principal</h2>
        <p>{{ animes.length }} animes encontrados</p>
      </div>

      <select>
        <option>Puntuación</option>
        <option>Popularidad</option>
      </select>
    </div>

    <p *ngIf="loading">Cargando animes...</p>
    <p *ngIf="error">{{ error }}</p>

    <div class="anime-grid" *ngIf="!loading && animes.length > 0">
      <app-anime-card
        *ngFor="let anime of animes"
        [anime]="anime">
      </app-anime-card>
    </div>

    <p *ngIf="!loading && animes.length === 0 && !error">
      No hay animes para mostrar.
    </p>
  </section>
</main>
